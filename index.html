<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse · AI灵感捕手</title>
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a2e;--border:#2a2a3e;--text:#e4e4f0;--dim:#8888a0;--accent:#6366f1;--accent2:#a855f7;--grad:linear-gradient(135deg,#6366f1,#a855f7);--amber:#f59e0b;--blue:#3b82f6;--purple:#a855f7;--green:#10b981;--red:#ef4444;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;height:100vh}

/* Sidebar */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0}
.logo{padding:0 24px 24px;font-size:20px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{flex:1;display:flex;flex-direction:column;gap:4px;padding:0 12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;color:var(--dim);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--accent)}
.nav-item.active .nav-icon{color:var(--accent)}
.nav-icon{font-size:18px;width:24px;text-align:center}
.sidebar-bottom{padding:16px 24px;border-top:1px solid var(--border)}
.agent-badge{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.agent-badge span{background:var(--surface2);padding:3px 8px;border-radius:6px}

/* Main */
.main{overflow-y:auto;padding:32px;position:relative}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Views */
.view{display:none;animation:fadeUp .4s ease}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.page-title{font-size:24px;font-weight:700;margin-bottom:24px}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--grad);opacity:.6}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:800;line-height:1}
.stat-value.grad{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:12px;color:var(--dim);margin-top:4px}

/* Charts row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.chart-title{font-size:14px;font-weight:600;color:var(--dim);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut{width:120px;height:120px;flex-shrink:0}
.donut-legend{flex:1;font-size:13px}
.donut-legend-item{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.donut-legend-item .dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px}
.donut-legend-item .count{font-weight:700;color:var(--text)}

/* Source bars */
.source-bars{display:flex;flex-direction:column;gap:10px}
.source-bar-row{display:flex;align-items:center;gap:12px}
.source-bar-label{font-size:13px;width:60px;flex-shrink:0}
.source-bar-track{flex:1;height:24px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative}
.source-bar-fill{height:100%;border-radius:6px;transition:width .8s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff}

/* Inspiration grid */
.insp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.insp-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid;border-radius:12px;padding:18px;transition:all .2s;cursor:pointer;position:relative}
.insp-card:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.insp-card.emotion-excited{border-left-color:var(--amber)}
.insp-card.emotion-curious{border-left-color:var(--blue)}
.insp-card.emotion-inspired{border-left-color:var(--purple)}
.insp-card.emotion-concerned{border-left-color:var(--red)}
.insp-card.emotion-neutral{border-left-color:var(--dim)}
.insp-emoji{position:absolute;top:14px;right:14px;font-size:16px}
.insp-title{font-size:15px;font-weight:600;margin-bottom:6px;padding-right:28px;line-height:1.4}
.insp-summary{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.insp-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.chip{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--dim)}
.insp-meta{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:8px}
.insp-source{padding:2px 6px;border-radius:4px;background:var(--surface2);font-weight:600}

/* Capture modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:560px;width:90%;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--grad)}
.modal h2{font-size:20px;margin-bottom:8px}
.modal p{font-size:14px;color:var(--dim);margin-bottom:16px}
.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:14px;font-family:inherit;min-height:100px;resize:vertical}
.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:12px;margin-top:16px}
.btn{padding:12px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(99,102,241,.3)}
.btn-ghost{background:transparent;color:var(--dim);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text)}

/* Floating capture button */
.fab{position:fixed;bottom:32px;right:32px;width:56px;height:56px;border-radius:50%;background:var(--grad);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.4);transition:all .2s;z-index:50;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1);box-shadow:0 8px 30px rgba(99,102,241,.5)}

/* Topics view */
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;transition:all .2s}
.topic-card:hover{border-color:var(--accent)}
.topic-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.topic-info{flex:1}
.topic-title{font-size:17px;font-weight:700;margin-bottom:6px;line-height:1.4}
.topic-angle{font-size:14px;color:var(--dim);margin-bottom:8px;line-height:1.5}
.topic-hook{font-size:14px;color:var(--accent);font-style:italic;padding:8px 12px;background:var(--surface2);border-radius:8px;margin-bottom:8px}
.topic-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.virality{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700}
.virality-high{background:rgba(245,158,11,.15);color:var(--amber)}
.virality-medium{background:rgba(59,130,246,.15);color:var(--blue)}
.format-tag{padding:4px 10px;border-radius:6px;background:var(--surface2);font-size:12px;color:var(--dim)}
.deepdive-btn{padding:8px 16px;border-radius:8px;background:var(--grad);color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.deepdive-btn:hover{transform:translateY(-1px)}

/* Deep dive panel */
.deepdive-panel{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:none;animation:fadeUp .3s}
.deepdive-panel.show{display:block}
.dd-section{margin-bottom:16px}
.dd-label{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.dd-headlines{display:flex;flex-direction:column;gap:6px}
.dd-headline{padding:10px 14px;background:var(--surface2);border-radius:8px;font-size:14px;cursor:pointer;transition:all .15s}
.dd-headline:hover{background:var(--border)}
.dd-structure{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dd-step{background:var(--surface2);padding:8px 12px;border-radius:8px;font-size:13px;max-width:200px}
.dd-arrow{color:var(--dim)}
.dd-quotes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dd-quote{padding:12px 16px;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(168,85,247,.08));border:1px solid rgba(99,102,241,.2);border-radius:10px;font-size:14px;font-style:italic;line-height:1.5}
.dd-image-btn{padding:8px 16px;border-radius:8px;background:var(--surface2);color:var(--accent);font-size:13px;font-weight:600;border:1px solid var(--accent);cursor:pointer}
.dd-image-result{margin-top:12px;border-radius:10px;overflow:hidden;max-width:300px}

/* DNA view */
.dna-hero{text-align:center;padding:20px 0 32px}
.dna-summary-text{font-size:22px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;max-width:600px;margin:0 auto;line-height:1.5}
.dna-badge{display:inline-block;margin-top:12px;padding:6px 14px;border-radius:8px;background:var(--surface2);font-size:13px;color:var(--dim)}
.dna-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dna-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.dna-tags-section{margin-bottom:16px}
.dna-tags-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.dna-tags-label.themes{color:var(--purple)}
.dna-tags-label.tone{color:var(--blue)}
.dna-tags-label.formats{color:var(--green)}
.dna-tag{display:inline-block;padding:6px 12px;border-radius:8px;margin:3px;font-size:13px}
.dna-tag.theme{background:rgba(168,85,247,.12);color:var(--purple)}
.dna-tag.tone{background:rgba(59,130,246,.12);color:var(--blue)}
.dna-tag.format{background:rgba(16,185,129,.12);color:var(--green)}
.strength-item{margin-bottom:12px}
.strength-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.strength-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.strength-fill{height:100%;background:var(--grad);border-radius:3px;transition:width 1s ease}
.reco-card{background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:8px;font-size:14px;line-height:1.5}
.reco-card .reco-icon{margin-right:6px}

/* Radar chart */
.radar-wrap{display:flex;justify-content:center;padding:20px 0}
.radar{width:260px;height:260px}

/* Insights view */
.cluster-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px}
.cluster-theme{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:6px}
.cluster-desc{font-size:14px;color:var(--dim);margin-bottom:10px;line-height:1.5}
.cluster-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.cluster-item{padding:4px 10px;border-radius:6px;background:var(--surface2);font-size:12px}
.cluster-opportunity{padding:8px 12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:8px;font-size:13px;color:var(--green)}

/* Model routing table */
.routing-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:16px}
.routing-table th{text-align:left;padding:10px;border-bottom:1px solid var(--border);color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.routing-table td{padding:10px;border-bottom:1px solid var(--border)}
.routing-table td:first-child{font-weight:600}
.routing-model{font-family:"SF Mono",monospace;font-size:12px;color:var(--accent)}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-text{font-size:15px}
.empty-hint{font-size:13px;margin-top:8px;color:var(--border)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 24px;font-size:14px;z-index:200;opacity:0;transition:all .3s}
.toast.show{opacity:1;top:36px}
.toast.success{border-color:var(--green);color:var(--green)}

@media(max-width:900px){.stats-bar{grid-template-columns:repeat(2,1fr)}.charts-row,.dna-grid{grid-template-columns:1fr}.app{grid-template-columns:64px 1fr}.sidebar .logo,.nav-item span:not(.nav-icon),.sidebar-bottom{display:none}.nav-item{justify-content:center}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo">✦ Muse</div>
    <div class="nav">
      <div class="nav-item active" data-view="inbox" onclick="switchView('inbox')"><span class="nav-icon">📥</span><span>灵感流</span></div>
      <div class="nav-item" data-view="topics" onclick="switchView('topics')"><span class="nav-icon">✦</span><span>选题工厂</span></div>
      <div class="nav-item" data-view="dna" onclick="switchView('dna')"><span class="nav-icon">🧬</span><span>创作DNA</span></div>
      <div class="nav-item" data-view="insights" onclick="switchView('insights')"><span class="nav-icon">📊</span><span>洞察汇总</span></div>
    </div>
    <div class="sidebar-bottom">
      <div class="agent-badge">
        <span>🔌 Telegram</span><span>Discord</span><span>Slack</span><span>Any Agent</span>
      </div>
    </div>
  </div>

  <div class="main">
    <!-- INBOX VIEW -->
    <div class="view active" id="view-inbox">
      <div class="page-title">灵感流</div>
      <div class="stats-bar" id="stats-bar"><div class="loading"><div class="spinner"></div></div></div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">情绪分布</div>
          <div class="donut-wrap"><svg class="donut" id="emotion-donut" viewBox="0 0 120 120"></svg><div class="donut-legend" id="emotion-legend"></div></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">来源分布</div>
          <div class="source-bars" id="source-bars"></div>
        </div>
      </div>
      <div id="insp-list" class="insp-grid"></div>
    </div>

    <!-- TOPICS VIEW -->
    <div class="view" id="view-topics">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <div class="page-title" style="margin-bottom:0">选题工厂</div>
        <button class="btn btn-primary" onclick="generateTopics()" id="gen-topics-btn">✦ 生成选题</button>
      </div>
      <div id="topics-list"><div class="empty"><div class="empty-icon">✦</div><div class="empty-text">还没有选题</div><div class="empty-hint">点击「生成选题」从你的灵感中提取内容方向</div></div></div>
    </div>

    <!-- DNA VIEW -->
    <div class="view" id="view-dna">
      <div class="page-title">创作DNA</div>
      <div id="dna-content"><div class="empty"><div class="empty-icon">🧬</div><div class="empty-text">还没有DNA分析</div><div class="empty-hint">完成 Onboarding 后这里会显示你的创作基因</div></div></div>
    </div>

    <!-- INSIGHTS VIEW -->
    <div class="view" id="view-insights">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <div class="page-title" style="margin-bottom:0">洞察汇总</div>
        <button class="btn btn-primary" onclick="generateClusters()">📊 聚类分析</button>
      </div>
      <div id="clusters-list"></div>
      <div style="margin-top:32px">
        <div class="chart-card">
          <div class="chart-title">🤖 模型路由策略 — 每个节点用什么模型，为什么</div>
          <div id="routing-table-wrap"><div class="loading"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Capture Modal -->
<div class="modal-overlay" id="capture-modal">
  <div class="modal">
    <h2>✦ 捕捉灵感</h2>
    <p>粘贴任何文字、链接、灵感片段 — AI 自动提炼标题、摘要和关键词</p>
    <textarea id="capture-input" placeholder="把你的灵感粘贴在这里…"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitCapture()" id="capture-submit">✦ 捕捉</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="捕捉灵感">✦</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = location.origin;
const EMOTION_META = {
  excited:{emoji:'🔥',color:'#f59e0b',label:'兴奋'},
  curious:{emoji:'🤔',color:'#3b82f6',label:'好奇'},
  inspired:{emoji:'✨',color:'#a855f7',label:'启发'},
  concerned:{emoji:'⚠️',color:'#ef4444',label:'关注'},
  neutral:{emoji:'📌',color:'#8888a0',label:'中性'}
};

function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelector(`.nav-item[data-view="${name}"]`).classList.add('active');
  if(name==='dna')loadDNA();
  if(name==='insights')loadRouting();
}

// ===== LOAD DATA =====
async function loadStats(){
  try{
    const r=await fetch(`${API}/api/stats`);const d=await r.json();
    const sources=d.sources||{};const emotions=d.emotions||{};
    const topEmotion=Object.entries(emotions).sort((a,b)=>b[1]-a[1])[0];
    
    document.getElementById('stats-bar').innerHTML=`
      <div class="stat-card"><div class="stat-icon">📥</div><div class="stat-value grad">${d.total||0}</div><div class="stat-label">总灵感数</div></div>
      <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value grad">${d.this_week||0}</div><div class="stat-label">本周捕捉</div></div>
      <div class="stat-card"><div class="stat-icon">🔌</div><div class="stat-value grad">${Object.keys(sources).length}</div><div class="stat-label">来源数</div></div>
      <div class="stat-card"><div class="stat-icon">${topEmotion?EMOTION_META[topEmotion[0]]?.emoji:'🎯'}</div><div class="stat-value grad">${topEmotion?EMOTION_META[topEmotion[0]]?.label:'—'}</div><div class="stat-label">主导情绪</div></div>
    `;
    drawEmotionDonut(emotions);
    drawSourceBars(sources);
  }catch(e){console.error(e)}
}

function drawEmotionDonut(emotions){
  const total=Object.values(emotions).reduce((a,b)=>a+b,0)||1;
  const entries=Object.entries(emotions);
  let offset=0;let segs='';let legend='';
  // Background circle
  segs+='<circle cx="60" cy="60" r="44" fill="none" stroke="#1a1a2e" stroke-width="16"/>';
  for(const[emo,count] of entries){
    const meta=EMOTION_META[emo]||EMOTION_META.neutral;
    const pct=count/total;const dash=pct*276.46; // 2*PI*44
    segs+=`<circle cx="60" cy="60" r="44" fill="none" stroke="${meta.color}" stroke-width="16" stroke-dasharray="${dash} 276.46" stroke-dashoffset="${-offset}" transform="rotate(-90 60 60)" style="transition:stroke-dasharray 1s"/>`;
    offset+=dash;
    legend+=`<div class="donut-legend-item"><span><span class="dot" style="background:${meta.color}"></span>${meta.emoji} ${meta.label}</span><span class="count">${count}</span></div>`;
  }
  if(entries.length===0){legend='<div style="color:var(--dim);font-size:13px">暂无数据</div>'}
  document.getElementById('emotion-donut').innerHTML=segs+`<text x="60" y="56" text-anchor="middle" fill="#e4e4f0" font-size="28" font-weight="800">${total}</text><text x="60" y="72" text-anchor="middle" fill="#8888a0" font-size="10">TOTAL</text>`;
  document.getElementById('emotion-legend').innerHTML=legend;
}

function drawSourceBars(sources){
  const entries=Object.entries(sources);
  const max=Math.max(...entries.map(e=>e[1]))||1;
  const colors=['#6366f1','#a855f7','#ec4899','#f59e0b','#10b981'];
  let html='';
  if(entries.length===0){html='<div style="color:var(--dim);font-size:13px">暂无数据</div>'}
  entries.forEach(([src,count],i)=>{
    const pct=(count/max*100).toFixed(0);
    html+=`<div class="source-bar-row"><div class="source-bar-label">${src}</div><div class="source-bar-track"><div class="source-bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}">${count}</div></div></div>`;
  });
  document.getElementById('source-bars').innerHTML=html;
}

async function loadInspirations(){
  try{
    const r=await fetch(`${API}/api/inspirations`);const data=await r.json();
    const list=document.getElementById('insp-list');
    if(!data||data.length===0){
      list.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📥</div><div class="empty-text">还没有灵感</div><div class="empty-hint">点击右下角 ✦ 按钮捕捉你的第一条灵感</div></div>';
      return;
    }
    list.innerHTML=data.map(insp=>{
      const meta=EMOTION_META[insp.emotion]||EMOTION_META.neutral;
      const chips=(insp.keywords||[]).slice(0,5).map(k=>`<span class="chip">${k}</span>`).join('');
      const tags=(insp.tags||[]).slice(0,3).map(t=>`<span class="chip">${t}</span>`).join('');
      const time=relativeTime(insp.created_at);
      return `<div class="insp-card emotion-${insp.emotion||'neutral'}" onclick="deepDiveFromInspiration('${(insp.title||'').replace(/'/g,"\\'")}')">

    }).join('');
  }catch(e){console.error(e)}
}

  try{
    const r=await fetch(`${API}/api/deepdive`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:title})});
    const d=await r.json();
    const dd=d.deepdive||{};
    const s=dd.structure||{};
    panel.innerHTML=`
      ${dd.headlines&&dd.headlines.length?`<div class="dd-section"><div class="dd-label">📌 标题变体</div><div class="dd-headlines">${dd.headlines.map(h=>`<div class="dd-headline">${esc(h)}</div>`).join('')}</div></div>`:''}

        <div class="dd-step"><strong>开场</strong><br>${esc((s.opening||'').substring(0,60))}</div><span class="dd-arrow">→</span>
        <div class="dd-step"><strong>核心</strong><br>${(s.body||[]).map(b=>esc(b.substring(0,40))).join('<br>')}</div><span class="dd-arrow">→</span>
        <div class="dd-step"><strong>高潮</strong><br>${esc((s.climax||'').substring(0,60))}</div><span class="dd-arrow">→</span>
        <div class="dd-step"><strong>CTA</strong><br>${esc(s.cta||'')}</div>
      </div></div>`:''}
      ${dd.golden_quotes&&dd.golden_quotes.length?`<div class="dd-section"><div class="dd-label">✨ 金句</div><div class="dd-quotes">${dd.golden_quotes.map(q=>`<div class="dd-quote">${esc(q)}</div>`).join('')}</div></div>`:''}

          }).join('')||'<div style="color:var(--dim)">暂无数据</div>'}
        </div>
        <div class="dna-card">
          <div class="chart-title">🚀 优化建议</div>

        </div>
      </div>
    `;
    drawRadar(strengths);
  }catch(e){console.error(e)}
}

function drawRadar(strengths){
  const axes=['创意','逻辑','情绪','趋势','执行'];
  const vals=strengths.length>=5?[0.85,0.72,0.90,0.65,0.80]:[0.5,0.5,0.5,0.5,0.5];
  // If we have real strengths data, derive scores
  const cx=130,cy=130,maxR=90;
  let polyPoints='';
  for(let i=0;i<5;i++){
    const angle=-Math.PI/2+i*2*Math.PI/5;
    const r=maxR*vals[i];
    polyPoints+=`${cx+r*Math.cos(angle)},${cy+r*Math.sin(angle)} `;
  }
  let grid='';
  for(let level=1;level<=4;level++){
    let pts='';
    const r=maxR*level/4;
    for(let i=0;i<5;i++){
      const angle=-Math.PI/2+i*2*Math.PI/5;
      pts+=`${cx+r*Math.cos(angle)},${cy+r*Math.sin(angle)} `;
    }
    grid+=`<polygon points="${pts}" fill="none" stroke="#2a2a3e" stroke-width="1"/>`;
  }
  let axisLines='';
  let labels='';
  for(let i=0;i<5;i++){
    const angle=-Math.PI/2+i*2*Math.PI/5;
    const x2=cx+maxR*Math.cos(angle);
    const y2=cy+maxR*Math.sin(angle);
    axisLines+=`<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#2a2a3e" stroke-width="1"/>`;
    const lx=cx+(maxR+18)*Math.cos(angle);
    const ly=cy+(maxR+18)*Math.sin(angle);
    labels+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#8888a0" font-size="12">${axes[i]}</text>`;
  }
  document.getElementById('dna-radar').innerHTML=grid+axisLines+
    `<polygon points="${polyPoints}" fill="url(#radarGrad)" fill-opacity="0.3" stroke="#a855f7" stroke-width="2"/>`+
    labels+
    `<defs><linearGradient id="radarGrad"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>`;
}

// ===== CAPTURE =====
function openModal(){document.getElementById('capture-modal').classList.add('show');setTimeout(()=>document.getElementById('capture-input').focus(),100)}
function closeModal(){document.getElementById('capture-modal').classList.remove('show')}
async function submitCapture(){
  const content=document.getElementById('capture-input').value.trim();
  if(!content){showToast('内容不能为空','error');return}
  const btn=document.getElementById('capture-submit');
  btn.textContent='AI分析中…';btn.disabled=true;
  try{
    const r=await fetch(`${API}/api/ingest`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({source:'web',content})});
    const d=await r.json();
    if(d.ok){
      showToast('✓ 灵感已捕捉','success');
      document.getElementById('capture-input').value='';
      closeModal();
      loadStats();loadInspirations();
    }else{showToast('捕捉失败','error')}
  }catch(e){showToast('网络错误','error')}
  btn.textContent='✦ 捕捉';btn.disabled=false;
}

function deepDiveFromInspiration(title){
  switchView('topics');
  setTimeout(()=>{
    if(document.getElementById('topics-list').querySelector('.topic-card'))return;
    toggleDeepDive(0,title);
  },300);
}

// ===== UTILS =====
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function relativeTime(ts){if(!ts)return'';const now=Date.now();const t=new Date(ts).getTime();const diff=now-t;if(diff<60000)return'刚刚';if(diff<3600000)return Math.floor(diff/60000)+'分钟前';if(diff<86400000)return Math.floor(diff/3600000)+'小时前';return Math.floor(diff/86400000)+'天前'}
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>t.classList.remove('show'),3000)}

// Init
loadStats();loadInspirations();
